{% extends "shared/base.html" %}

{% block title %}Page Not Found - ZapRead{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-page">
                <h1 class="display-1 fw-bold text-primary">404</h1>
                <h2 class="mb-4">Oops! Page Not Found</h2>
                <p class="lead mb-5">The page you're looking for doesn't exist or has been moved.</p>
                
                <div class="error-actions">
                    <a href="{{ url_for('core.index') }}" class="btn btn-premium btn-premium-primary me-3">
                        <i class="bi bi-house-door"></i> Back to Home
                    </a>
                    <a href="{{ url_for('core.dashboard') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-grid"></i> Go to Dashboard
                    </a>
                </div>
                
                <div class="mt-5">
                    <h4 class="mb-3">Here are some helpful links:</h4>
                    <div class="row justify-content-center">
                        <div class="col-md-4">
                            <a href="{{ url_for('core.index') }}" class="text-decoration-none">
                                <div class="card-premium p-3 mb-3 text-center">
                                    <i class="bi bi-house-door fs-2 mb-2"></i>
                                    <h5>Home</h5>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a href="{{ url_for('core.upload_file') }}" class="text-decoration-none">
                                <div class="card-premium p-3 mb-3 text-center">
                                    <i class="bi bi-upload fs-2 mb-2"></i>
                                    <h5>Upload Document</h5>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a href="{{ url_for('core.faq') }}" class="text-decoration-none">
                                <div class="card-premium p-3 mb-3 text-center">
                                    <i class="bi bi-question-circle fs-2 mb-2"></i>
                                    <h5>FAQ</h5>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

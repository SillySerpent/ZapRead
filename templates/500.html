{% extends "shared/base.html" %}

{% block title %}Server Error - ZapRead{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-page">
                <h1 class="display-1 fw-bold text-danger">500</h1>
                <h2 class="mb-4">Server Error</h2>
                <p class="lead mb-5">Oops! Something went wrong on our end. Our team has been notified and is working to fix the issue.</p>
                
                <div class="error-actions">
                    <a href="{{ url_for('core.index') }}" class="btn btn-premium btn-premium-primary me-3">
                        <i class="bi bi-house-door"></i> Back to Home
                    </a>
                    <button onclick="window.location.reload()" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i> Try Again
                    </button>
                </div>
                
                <div class="mt-5">
                    <div class="contact-support">
                        <a href="mailto:support@zapread.com" class="btn btn-outline-primary me-2">
                            <i class="bi bi-envelope"></i> Contact Support
                        </a>
                        <a href="{{ url_for('core.feedback') }}" class="btn btn-outline-primary">
                            <i class="bi bi-chat-dots"></i> Send Feedback
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
